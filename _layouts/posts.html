---
layout: single
---

{{ content }}

{% for post in site.posts %}
  <a href="{{ post.url }}">{{ post.title }}</a>

  <div>
    <p>{{ post.excerpt | remove: '<p>' | remove: '</p>' }}
      <br/>
      <a href="{{ site.baseurl }}{{ post.url }}" class="read-more">Read More</a
    ></p>
  </div>
{% endfor %}
